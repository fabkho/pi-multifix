name: anny

issueTracker:
  type: clickup
  clickup:
    tokenEnv: CLICKUP_API_TOKEN

repos:
  frontend:
    path: ~/code/anny/anny-ui
    contextFiles:
      - .github/copilot-instructions.md
    preMRHooks:
      - cmd: yarn
        args: [lint:fix]
  backend:
    path: ~/code/anny/bookings-api
    contextFiles:
      - .github/copilot-instructions.md
      - AGENTS.md
    preMRHooks:
      - cmd: ./vendor/bin/pint
      - cmd: ./vendor/bin/phpstan
        args: [analyse, --memory-limit=2G]

postMergeHooks:
  - type: clickup-comment   # agent writes this via update_issue during implementation
  - type: clickup-status
    status: code review

workspace:
  root: ~/code/anny/worktrees
