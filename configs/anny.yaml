name: anny

issueTracker:
  type: clickup
  doneStatus: code review
  clickup:
    tokenEnv: CLICKUP_API_TOKEN

repos:
  frontend:
    path: ~/code/anny/anny-ui
    contextFiles:
      - .github/copilot-instructions.md
  backend:
    path: ~/code/anny/bookings-api
    contextFiles:
      - .github/copilot-instructions.md
      - AGENTS.md

workspace:
  root: ~/code/anny/worktrees
